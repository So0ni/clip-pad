{{define "content"}}
<main class="page" data-page="notepad">
  <section class="card">
    <div class="notepad-titlebar">
      <div>
        <h1>Simple Notepad</h1>
        <p class="muted">A plain-text workspace saved in this browser.</p>
      </div>
      <div class="notepad-actions">
        <button id="notepad-new-btn" class="button button-secondary button-sm button-icon" type="button" title="New note" aria-label="New note">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M7 1.5v11M1.5 7h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="notepad-list-btn" class="button button-secondary button-sm button-icon" type="button" title="Notes" aria-label="Notes" aria-expanded="false" aria-controls="notepad-list-panel">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
            <path d="M4.5 4h8M4.5 7.5h8M4.5 11h8M2.25 4h.01M2.25 7.5h.01M2.25 11h.01" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="notepad-share-btn" class="button button-secondary button-sm button-icon" type="button" title="Share note" aria-label="Share note" aria-expanded="false" aria-controls="notepad-share-panel">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
            <path d="M5.5 8.4l4-2.3M5.5 6.6l4 2.3M4.2 9.9a1.9 1.9 0 1 1 0-3.8 1.9 1.9 0 0 1 0 3.8ZM10.8 6.9a1.9 1.9 0 1 1 0-3.8 1.9 1.9 0 0 1 0 3.8ZM10.8 11.9a1.9 1.9 0 1 1 0-3.8 1.9 1.9 0 0 1 0 3.8Z" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="notepad-max-btn" class="button button-secondary button-sm" type="button">
          <svg id="notepad-max-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg id="notepad-restore-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true" class="hidden">
            <path d="M5 1v4H1M13 5H9V1M9 13v-4h4M1 9h4v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="notepad-max-label">Maximize</span>
        </button>
      </div>
    </div>
    <div id="notepad-list-panel" class="notepad-list-panel hidden" aria-label="Notes">
      <div id="notepad-list" class="notepad-list"></div>
    </div>
    <div id="notepad-share-panel" class="notepad-share-panel hidden" aria-label="Share note">
      <div class="share-panel-head">
        <strong>Share snapshot</strong>
        <span>Read-only copy</span>
      </div>
      <label class="field-label" for="notepad-share-expire">Auto destroy</label>
      <select id="notepad-share-expire">
        <option value="1d">1 day</option>
        <option value="7d">7 days</option>
        <option value="30d">30 days</option>
      </select>
      <button id="notepad-create-share-btn" class="button button-sm" type="button">Create link</button>
      <p id="notepad-share-feedback" class="feedback" aria-live="polite"></p>
      <div id="notepad-share-result" class="share-result hidden">
        <input id="notepad-share-url" type="text" readonly aria-label="Note share URL">
        <button type="button" class="button button-secondary button-sm" id="copy-note-share-url-btn">Copy</button>
      </div>
    </div>
    <div class="field">
      <label class="field-label" for="notepad-text">Notes</label>
      <textarea id="notepad-text" rows="18" placeholder="Start typing..."></textarea>
    </div>
    <div class="notepad-statusbar" aria-live="polite">
      <span id="notepad-save-status">Loading...</span>
      <span id="stats-characters">0 chars</span>
      <span id="stats-words">0 words</span>
      <span id="stats-lines">0 lines</span>
    </div>
  </section>
</main>
{{end}}
