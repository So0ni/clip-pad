{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>ClipPad</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    (function(){var t=localStorage.getItem('clip-pad-theme');if(t==='blue'||t==='milk'||t==='warm')document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <script defer src="/static/qrcode.min.js"></script>
  <script defer src="/static/app.js"></script>
</head>
<body>
  <div class="shell">
    <header class="site-header">
      <a class="brand" href="/">
        <svg class="brand-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="6" y="4" width="16" height="21" rx="3" fill="#6b8f71" opacity="0.12"/>
          <rect x="6" y="4" width="16" height="21" rx="3" stroke="#6b8f71" stroke-width="1.8"/>
          <rect x="10" y="2" width="8" height="5" rx="1.5" fill="#f4f1e8" stroke="#6b8f71" stroke-width="1.6"/>
          <line x1="10" y1="13" x2="18" y2="13" stroke="#6b8f71" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="10" y1="17" x2="18" y2="17" stroke="#6b8f71" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="10" y1="21" x2="15" y2="21" stroke="#6b8f71" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        ClipPad
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="/" class="nav-link {{if eq .CurrentPage "paste-bin"}}is-active{{end}}">Paste-bin</a>
        <a href="/notepad" class="nav-link {{if eq .CurrentPage "notepad"}}is-active{{end}}">Simple Notepad</a>
      </nav>
      <div class="theme-switcher">
        <button
          id="theme-picker-button"
          class="theme-picker-trigger"
          type="button"
          aria-haspopup="listbox"
          aria-expanded="false"
          aria-controls="theme-picker-menu"
        >
          <span class="theme-picker-trigger-label">Theme</span>
          <span class="theme-picker-trigger-value">
            <span class="theme-swatch" data-theme-trigger-swatch aria-hidden="true"></span>
            <span data-theme-trigger-label>Warm</span>
          </span>
          <svg class="theme-picker-trigger-icon" width="12" height="8" viewBox="0 0 12 8" fill="none" aria-hidden="true">
            <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div
          id="theme-picker-menu"
          class="theme-menu hidden"
          role="listbox"
          aria-label="Color theme"
        >
          <button class="theme-option" type="button" data-theme-option="warm" role="option" aria-selected="false">
            <span class="theme-swatch" data-theme-swatch="warm" aria-hidden="true"></span>
            <span class="theme-option-text">
              <strong>Warm</strong>
              <span>Soft paper tone</span>
            </span>
          </button>
          <button class="theme-option" type="button" data-theme-option="blue" role="option" aria-selected="false">
            <span class="theme-swatch" data-theme-swatch="blue" aria-hidden="true"></span>
            <span class="theme-option-text">
              <strong>Blue</strong>
              <span>Calm cool surface</span>
            </span>
          </button>
          <button class="theme-option" type="button" data-theme-option="milk" role="option" aria-selected="false">
            <span class="theme-swatch" data-theme-swatch="milk" aria-hidden="true"></span>
            <span class="theme-option-text">
              <strong>Milk</strong>
              <span>Clean bright canvas</span>
            </span>
          </button>
        </div>
      </div>
    </header>
    {{template "content" .}}
  </div>
</body>
</html>
{{end}}
